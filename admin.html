<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Escolar | Kairo Sushi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #111; color: white; font-family: 'Montserrat', sans-serif; padding: 20px; }
        h1 { color: #C6000F; text-align: center; margin-bottom: 20px;}
        
        .pedido-card { background-color: #222; border-left: 5px solid #C6000F; padding: 15px; margin-bottom: 15px; border-radius: 8px; position: relative;}
        .pedido-card.pagado { border-left: 5px solid #25D366; opacity: 0.8; } 
        
        .btn-iniciar { display: block; width: 100%; background-color: #25D366; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-bottom: 20px; }
        
        /* Botones de acción */
        .botones-acciones { display: flex; gap: 10px; margin-top: 15px; }
        .btn-pagado { background-color: #C6000F; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1;}
        .btn-eliminar { background-color: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .datos-escuela { color: #aaa; font-size: 14px; margin-bottom: 10px; }
        .etiqueta-pagado { color: #25D366; font-weight: 800; font-size: 18px; text-align: center; margin-top: 15px; display: block; }
        .platillo { margin-left: 15px; color: #fff; }
        .total { font-weight: bold; color: #25D366; margin-top: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <h1>Recepción Kairo Sushi 🍣</h1>
    <button id="btn-turno" class="btn-iniciar">🟢 Iniciar Turno (Activar Sonido)</button>

    <div id="contenedor-pedidos">
        <p style="text-align: center; color: #888;">Esperando ventas en la prepa...</p>
    </div>

    <audio id="sonido-alerta" src="campana.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Importamos deleteDoc para poder borrar pedidos
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBeWazB4dcacQhcQ34C3AFC8LVOOSz1kq8",
            authDomain: "kairo-sushi.firebaseapp.com",
            projectId: "kairo-sushi",
            storageBucket: "kairo-sushi.firebasestorage.app",
            messagingSenderId: "644038650541",
            appId: "1:644038650541:web:cec55d55fee7bd9429f424"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let turnoIniciado = false;
        let primerCarga = true; 

        document.getElementById('btn-turno').addEventListener('click', () => {
            turnoIniciado = true;
            document.getElementById('btn-turno').style.backgroundColor = "#555";
            document.getElementById('btn-turno').innerText = "Turno Activo - Escuchando pedidos...";
            document.getElementById('sonido-alerta').play().catch(e => console.log(e));
        });

        // Marcar como pagado
        window.marcarPagado = async function(idPedido) {
            try {
                const pedidoRef = doc(db, "pedidos_kairo", idPedido);
                await updateDoc(pedidoRef, { estado: "Pagado" });
            } catch (error) { console.error(error); alert("Hubo un error al marcar como pagado."); }
        }

        // NUEVA FUNCIÓN: ELIMINAR PEDIDO
        window.eliminarPedido = async function(idPedido) {
            if(confirm("¿Estás seguro de que deseas eliminar este pedido para siempre?")) {
                try {
                    await deleteDoc(doc(db, "pedidos_kairo", idPedido));
                } catch (error) {
                    console.error("Error al eliminar:", error);
                    alert("Hubo un error al eliminar el pedido.");
                }
            }
        }

        const q = query(collection(db, "pedidos_kairo"), orderBy("fecha", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const contenedor = document.getElementById('contenedor-pedidos');
            contenedor.innerHTML = ''; 
            
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" && !primerCarga && turnoIniciado) {
                    document.getElementById('sonido-alerta').play();
                }
            });
            primerCarga = false;

            snapshot.forEach((docu) => {
                const data = docu.data();
                const id = docu.id; 
                
                let htmlPlatillos = '';
                if (data.platillos) {
                    data.platillos.forEach(p => {
                        htmlPlatillos += `<div class="platillo">- ${p.cantidad}x ${p.nombre}</div>`;
                    });
                }

                let titulo = '';
                let botonPagadoOEstado = '';
                let claseExtra = '';

                if(data.estado === "Pagado") {
                    titulo = `<h3>${data.cliente}</h3>`;
                    botonPagadoOEstado = `<div style="flex: 1;"><span class="etiqueta-pagado">✅ PAGADO</span></div>`;
                    claseExtra = 'pagado'; 
                } else {
                    titulo = `<h3 style="color: var(--rojo-kairo);">${data.cliente} (No ha pagado)</h3>`;
                    botonPagadoOEstado = `<button class="btn-pagado" onclick="marcarPagado('${id}')">Marcar PAGADO 💰</button>`;
                }

                // Aquí se agregó el contenedor de botones que incluye el botón de eliminar
                contenedor.innerHTML += `
                    <div class="pedido-card ${claseExtra}">
                        ${titulo}
                        <div class="datos-escuela">
                            📱 Tel: ${data.telefono} <br>
                            🎒 Grupo: ${data.grupo} (${data.turno}) <br>
                            🆔 Matrícula: ${data.matricula}
                        </div>
                        <hr style="border-color: #444; margin: 10px 0;">
                        ${htmlPlatillos}
                        <div class="total">Total a cobrar: $${data.totalPagar}</div>
                        
                        <div class="botones-acciones">
                            ${botonPagadoOEstado}
                            <button class="btn-eliminar" onclick="eliminarPedido('${id}')">🗑️ Eliminar</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
